# ─── GitHub Actions: Deploy Pipeline ────────────────────────────────────────
# Runs on push to main only.
# Builds Docker image, pushes to registry, deploys to DigitalOcean Droplet.

name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  REGISTRY:     ghcr.io
  IMAGE_NAME:   ${{ github.repository }}/portfolio-app

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key:      ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /srv/portfolio

            # Pull latest image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Zero-downtime deploy
            docker compose pull
            docker compose up -d --no-deps app
            docker compose exec -T app wget -qO- http://localhost:3000 || exit 1

            # Cleanup old images
            docker image prune -f

      - name: Deployment notification
        if: success()
        run: |
          echo "✅ Deployed successfully to https://yourdomain.dev"
