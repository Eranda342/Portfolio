worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  # ── MIME Types ────────────────────────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main buffer=16k;
  error_log  /var/log/nginx/error.log  warn;

  # ── Performance ───────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  75;
  keepalive_requests 1000;
  types_hash_max_size 2048;

  # ── Gzip Compression ─────────────────────────────────────────────────────
  gzip             on;
  gzip_vary        on;
  gzip_proxied     any;
  gzip_comp_level  6;
  gzip_min_length  1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # ── Rate Limiting ─────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;

  # ── Upstream — Next.js app ────────────────────────────────────────────────
  upstream nextjs {
    server app:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.dev www.yourdomain.dev;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.dev www.yourdomain.dev;

    # SSL certificates (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.dev/privkey.pem;

    # Modern TLS configuration
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # HSTS — 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header X-Frame-Options          "DENY"                 always;
    add_header X-XSS-Protection         "1; mode=block"        always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Static Assets — long-term cache ─────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    # ── Next.js Image Optimization endpoint ────────────────────────────────
    location /_next/image {
      proxy_pass http://nextjs;
      proxy_cache_valid 200 24h;
    }

    # ── Public static files ─────────────────────────────────────────────────
    location /public/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=86400";
    }

    # ── Main app proxy ──────────────────────────────────────────────────────
    location / {
      limit_req zone=general burst=20 nodelay;

      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;

      # No caching for HTML
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
  }
}
